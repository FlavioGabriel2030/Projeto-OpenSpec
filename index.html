    <script>
        // INTERFACE DO SUPABASE (Variável renomeada para supabaseClient)
const SUPABASE_URL = 'https://ucdjkgkrauobyzftdijf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3TcBN2EflOLPafH-e_XgmA_XuiIfVZD'; 
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Banco de dados em memória que será sincronizado com o Supabase
let servicosPorMontadora = {};
let montadoras = [];

// Estado Global da Aplicação
let estado = {
    telaAtual: 'orcamentos',
    placa: '',
    modelo: '',
    ano: '',
    whatsapp: '',
    montadora: '',
    servico: null,
    incluirMaoDeObra: true,
    filtroCatalogo: 'Todas',
    ordensSalvas: [],
    osSelecionada: null,
    carregando: true
};

// Inicializa buscando as peças dinamicamente do Supabase
async function carregarDadosDoBanco() {
    try {
        // Usando a variável corrigida supabaseClient
        const { data, error } = await supabaseClient
            .from('produtos_servicos')
            .select('*');

        if (error) throw error;

        // Agrupa as peças por montadora dinamicamente
        servicosPorMontadora = {};
        data.forEach(item => {
            if (!servicosPorMontadora[item.montadora]) {
                servicosPorMontadora[item.montadora] = [];
            }
            servicosPorMontadora[item.montadora].push({
                id: item.id,
                nome: item.nome,
                precoPeca: parseFloat(item.preco_peca),
                precoMaoDeObra: parseFloat(item.preco_mao_de_obra),
                descricao: item.descricao,
                estoque: item.estoque
            });
        });

        montadoras = Object.keys(servicosPorMontadora);
        
        // Define valores padrão baseados no banco carregado
        if (montadoras.length > 0) {
            estado.montadora = montadoras[0];
            estado.servico = servicosPorMontadora[montadoras[0]][0];
        }
        
        estado.carregando = false;
        renderizar();
    } catch (err) {
        console.error("Erro ao carregar catálogo:", err);
        document.getElementById('app').innerHTML = `<p class="text-red-400 text-center mt-12">Erro ao conectar ao banco de dados. Verifique a chave da API.</p>`;
    }
}

function formatarEstoque(qtd) {
    if (qtd === 0) return 'Sem estoque';
    if (qtd <= 5) return `Estoque baixo: ${qtd} un.`;
    return `${qtd} un. em estoque`;
}

function obterClasseEstoque(qtd) {
    if (qtd === 0) return 'text-red-400 bg-red-950/50 border-red-800/60';
    if (qtd <= 5) return 'text-amber-400 bg-amber-950/50 border-amber-800/60';
    return 'text-emerald-400 bg-emerald-950/50 border-emerald-800/60';
}

function formatarDataOS(data) {
    if (!data) return '—';

    const dataOS = new Date(data);
    if (Number.isNaN(dataOS.getTime())) return '—';

    return dataOS.toLocaleDateString('pt-BR');
}

function formatarValorEmReais(valor) {
    return Number(valor || 0).toLocaleString('pt-BR', {
        style: 'currency',
        currency: 'BRL'
    });
}

// Funções de Evento Globais
window.alterarMontadora = function(novaMontadora) {
    estado.montadora = novaMontadora;
    estado.servico = servicosPorMontadora[novaMontadora][0];
    renderizar();
};

window.alterarServico = function(idServico) {
    const servicoEncontrado = servicosPorMontadora[estado.montadora].find(s => s.id === idServico);
    if(servicoEncontrado) estado.servico = servicoEncontrado;
    renderizar();
};

window.alterarMaoDeObra = function(valor) {
    estado.incluirMaoDeObra = valor;
    renderizar();
};

window.alterarPlaca = function(valor) {
    estado.placa = valor.replace(/[^a-zA-Z0-9]/g, '').toUpperCase().slice(0, 7);
    // Se o usuário apagar o campo, limpa os metadados do veículo
    if (estado.placa.length < 7) {
        estado.modelo = '';
        estado.ano = '';
        estado.whatsapp = '';
    }
    renderizar();
};

window.consultarPlacaVeiculo = async function() {
    if (estado.placa.length !== 7) return;

    // Usando a variável corrigida supabaseClient
    const { data, error } = await supabaseClient
        .from('veiculos')
        .select('*')
        .eq('placa', estado.placa)
        .maybeSingle();

    if (error) {
        estado.modelo = '';
        estado.ano = '';
        estado.whatsapp = '';
        console.error("Erro na busca da placa:", error);
        renderizar();
        return;
    }

    if (data) {
        estado.modelo = data.modelo;
        estado.ano = String(data.ano);
        estado.whatsapp = data.whatsapp || '';
        if (montadoras.includes(data.montadora)) {
            estado.montadora = data.montadora;
            estado.servico = servicosPorMontadora[data.montadora][0];
        }
    } else {
        estado.modelo = '';
        estado.ano = '';
        estado.whatsapp = '';
        alert('Placa não encontrada no banco de dados. Você pode continuar simulando, mas informe um carro cadastrado para salvar a OS.');
    }

    renderizar();
};

window.alterarFiltroCatalogo = function(filtro) {
    estado.filtroCatalogo = filtro;
    renderizar();
};

window.mudarTela = function(novaTela) {
    estado.telaAtual = novaTela;
    renderizar();

    if (novaTela === 'ordens') {
        window.carregarOrdens();
    }
};

window.carregarOrdens = async function() {
    try {
        const { data, error } = await supabaseClient
            .from('ordens_servico')
            .select('*')
            .order('id', { ascending: false });

        if (error) throw error;

        estado.ordensSalvas = data || [];
        renderizar();
    } catch (err) {
        console.error('Erro ao carregar ordens de serviço:', err);
        alert('Não foi possível carregar as ordens de serviço.');
    }
};

window.atualizarStatusOS = async function(id, novoStatus) {
    const ordem = estado.ordensSalvas.find(item => item.id === id);
    const statusAnterior = ordem?.status;

    if (ordem) {
        ordem.status = novoStatus;
        renderizar();
    }

    try {
        const { error } = await supabaseClient
            .from('ordens_servico')
            .update({ status: novoStatus })
            .eq('id', id);

        if (error) throw error;
    } catch (err) {
        if (ordem) {
            ordem.status = statusAnterior;
            renderizar();
        }

        console.error('Erro ao atualizar status da ordem de serviço:', err);
        alert('Não foi possível atualizar o status da ordem de serviço.');
    }
};

window.abrirDetalhesOS = function(idOS) {
    const ordem = estado.ordensSalvas.find(item => item.id === idOS);
    if (!ordem) return;

    let detalhesPeca = null;

    for (const servicos of Object.values(servicosPorMontadora)) {
        detalhesPeca = servicos.find(peca => String(peca.id) === String(ordem.servico_id));

        if (detalhesPeca) break;
    }

    estado.osSelecionada = { ...ordem, detalhesPeca };
    renderizar();
};

window.fecharDetalhesOS = function() {
    estado.osSelecionada = null;
    renderizar();
};

window.cadastrarVeiculo = async function() {
    const placa = document.getElementById('cadastro-veiculo-placa').value.trim().toUpperCase();
    const whatsapp = document.getElementById('cadastro-veiculo-whatsapp').value.replace(/\D/g, '');
    const montadora = document.getElementById('cadastro-veiculo-montadora').value;
    const modelo = document.getElementById('cadastro-veiculo-modelo').value.trim();
    const ano = Number.parseInt(document.getElementById('cadastro-veiculo-ano').value, 10);

    if (!placa || !whatsapp || !montadora || !modelo || !Number.isInteger(ano)) {
        alert('Preencha todos os campos do veículo corretamente.');
        return;
    }

    try {
        const { error } = await supabaseClient
            .from('veiculos')
            .insert([{
                placa,
                whatsapp,
                montadora,
                modelo,
                ano
            }]);

        if (error) throw error;

        alert(`Veículo de placa ${placa} cadastrado com sucesso!`);
        document.getElementById('form-cadastro-veiculo').reset();
    } catch (err) {
        console.error('Erro ao cadastrar veículo:', err);
        alert('Não foi possível cadastrar o veículo. Verifique se a placa já está cadastrada.');
    }
};

window.cadastrarProduto = async function() {
    const id = document.getElementById('cadastro-produto-id').value.trim();
    const nome = document.getElementById('cadastro-produto-nome').value.trim();
    const precoPeca = Number.parseFloat(document.getElementById('cadastro-produto-preco-peca').value);
    const precoMaoDeObra = Number.parseFloat(document.getElementById('cadastro-produto-preco-mao-obra').value);
    const descricao = document.getElementById('cadastro-produto-descricao').value.trim();
    const estoque = Number.parseInt(document.getElementById('cadastro-produto-estoque').value, 10);
    const montadora = document.getElementById('cadastro-produto-montadora').value;

    if (!id || !nome || !Number.isFinite(precoPeca) || !Number.isFinite(precoMaoDeObra) || !descricao || !Number.isInteger(estoque) || !montadora) {
        alert('Preencha todos os campos da peça ou serviço corretamente.');
        return;
    }

    try {
        const { error } = await supabaseClient
            .from('produtos_servicos')
            .insert([{
                id,
                nome,
                preco_peca: precoPeca,
                preco_mao_de_obra: precoMaoDeObra,
                descricao,
                estoque,
                montadora
            }]);

        if (error) throw error;

        await carregarDadosDoBanco();
        document.getElementById('form-cadastro-produto')?.reset();
        alert(`${nome} foi adicionado ao catálogo com sucesso!`);
    } catch (err) {
        console.error('Erro ao cadastrar peça ou serviço:', err);
        alert('Não foi possível salvar no catálogo. Verifique os dados e tente novamente.');
    }
};

// ENVIANDO A ORDEM DE SERVIÇO PARA O SUPABASE
window.salvarOS = async function() {
    if (!estado.placa || !estado.modelo) {
        alert("Por favor, consulte uma placa válida de veículo cadastrado antes de salvar a Ordem de Serviço!");
        return;
    }

    if (estado.servico.estoque <= 0) {
        alert("❌ Estoque insuficiente! Não é possível abrir uma OS para esta peça no momento.");
        return;
    }

    const precoMaoDeObra = estado.incluirMaoDeObra ? estado.servico.precoMaoDeObra : 0;
    const valorTotal = estado.servico.precoPeca + precoMaoDeObra;

    try {
        // Usando a variável corrigida supabaseClient
        const { error } = await supabaseClient
            .from('ordens_servico')
            .insert([{
                placa_veiculo: estado.placa,
                servico_id: estado.servico.id,
                valor_total: valorTotal,
                status: 'Orçamento'
            }]);

        if (error) throw error;

        const novoEstoque = estado.servico.estoque - 1;
        const { error: erroEstoque } = await supabaseClient
            .from('produtos_servicos')
            .update({ estoque: novoEstoque })
            .eq('id', estado.servico.id);

        if (erroEstoque) {
            console.error("Erro ao atualizar o estoque da peça:", erroEstoque);
            throw erroEstoque;
        }

        estado.servico.estoque = novoEstoque;
        await carregarDadosDoBanco();

        alert(`🎯 Ordem de Serviço cadastrada com sucesso para o veículo ${estado.modelo}!`);
        
        estado.placa = '';
        estado.modelo = '';
        estado.ano = '';
        estado.whatsapp = '';
        renderizar();
        
    } catch (err) {
        console.error("Erro ao salvar OS ou atualizar estoque:", err);
        alert("Falha ao concluir a Ordem de Serviço e atualizar o estoque.");
    }
};

window.enviarWhatsApp = function() {
    if (!estado.placa || !estado.servico) {
        alert("Consulte um veículo e selecione um serviço!");
        return;
    }

    if (!estado.whatsapp) {
        alert("Este veículo não possui um WhatsApp cadastrado. Atualize o cadastro do cliente.");
        return;
    }

    const precoMaoDeObra = estado.incluirMaoDeObra ? estado.servico.precoMaoDeObra : 0;
    const valorTotal = estado.servico.precoPeca + precoMaoDeObra;
    const mensagem = `*⚙️ MECÂNICA PREMIUM - ORÇAMENTO*

Veículo: ${estado.modelo} (${estado.ano})
Placa: ${estado.placa}
Serviço: ${estado.servico.nome}

*Valor da Peça:* R$ ${estado.servico.precoPeca.toFixed(2)}
Mão de Obra: ${estado.incluirMaoDeObra ? 'R$ ' + precoMaoDeObra.toFixed(2) : 'Não inclusa'}
*💰 TOTAL ESTIMADO: R$ ${valorTotal.toFixed(2)}*

Deseja aprovar o serviço?`;

    const numeroLimpo = estado.whatsapp.replace(/\D/g, '');
    const url = 'https://wa.me/' + numeroLimpo + '?text=' + encodeURIComponent(mensagem);
    window.open(url, '_blank');
};

function renderizarCardPeca(peca) {
    return `
        <div class="bg-slate-900/50 border border-slate-700/60 rounded-xl p-4 flex flex-col gap-3 hover:border-slate-600 transition-all">
            <div class="flex justify-between items-start gap-3">
                <h5 class="font-semibold text-slate-200 text-sm leading-snug">${peca.nome}</h5>
                <span class="text-sm font-bold text-slate-300 whitespace-nowrap">R$ ${peca.precoPeca.toFixed(2)}</span>
            </div>
            <p class="text-xs text-slate-400 leading-relaxed flex-grow">${peca.descricao}</p>
            <div class="flex justify-between items-center pt-2 border-t border-slate-800">
                <span class="text-xs px-2.5 py-1 rounded-md border font-semibold ${obterClasseEstoque(peca.estoque)}">${formatarEstoque(peca.estoque)}</span>
                <span class="text-xs text-slate-500">${peca.estoque} un.</span>
            </div>
        </div>
    `;
}

function renderizarSecaoCatalogo(filtroCatalogo) {
    const montadorasExibir = filtroCatalogo === 'Todas' ? montadoras : [filtroCatalogo];
    const opcoesFiltro = ['Todas', ...montadoras];

    return `
        <div class="mt-12 pt-10 border-t border-slate-700/80">
            <div class="mb-8 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <div>
                    <h2 class="text-2xl font-extrabold text-white tracking-tight flex items-center gap-2">
                        <span>📦</span> Catálogo de Peças em Estoque
                    </h2>
                    <p class="text-slate-400 mt-2 text-sm">Consulte a disponibilidade de peças básicas puxadas do Supabase.</p>
                </div>
                <div class="flex flex-wrap gap-2">
                    ${opcoesFiltro.map(op => `
                        <button

                            ${op}
                        </button>
                    `).join('')}
                </div>
            </div>

            <div class="space-y-8">
                ${montadorasExibir.map(m => `
                    <div>
                        <h3 class="text-sm font-bold uppercase tracking-widest text-accent mb-4 flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-accent"></span>
                            ${m}
                            <span class="text-slate-500 font-normal normal-case tracking-normal">${servicosPorMontadora[m]?.length || 0} peças</span>
                        </h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">

}

function renderizar() {
    document.querySelectorAll('nav [data-tela]').forEach(link => {
        const telaAtiva = link.dataset.tela === estado.telaAtual;
        link.className = telaAtiva
            ? 'text-accent border-b border-accent pb-1 transition-all'
            : 'text-slate-300 hover:text-accent transition-all';
    });

    if (estado.telaAtual === 'orcamentos') {
        if (estado.carregando) return;

    const { placa, modelo, ano, montadora, servico, incluirMaoDeObra, filtroCatalogo } = estado;
    
    const precoMaoDeObra = incluirMaoDeObra ? (servico?.precoMaoDeObra || 0) : 0;
    const valorTotal = (servico?.precoPeca || 0) + precoMaoDeObra;

    const html = `
        <div class="mb-8 text-center sm:text-left">
            <h2 class="text-3xl font-extrabold text-white tracking-tight">Painel Operacional & Simulador de OS</h2>
            <p class="text-slate-400 mt-2">Valores dinâmicos integrados diretamente ao PostgreSQL do Supabase.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
            
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-cardBg p-6 rounded-2xl border border-slate-700 shadow-xl space-y-6">
                    
                    <div>
                        <label for="placa-veiculo" class="block text-sm font-semibold tracking-wide text-slate-300 mb-3 uppercase">1. Digite a Placa</label>
                        <input
                            id="placa-veiculo"

                            value="${placa}"

                            maxlength="7"
                            class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-500 uppercase tracking-widest font-semibold focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-all"
                        />
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4">
                            <div>
                                <label for="modelo-veiculo" class="block text-xs font-semibold tracking-wide text-slate-400 mb-2 uppercase">Modelo</label>
                                <input
                                    id="modelo-veiculo"
                                    type="text"
                                    value="${modelo}"

                                />
                            </div>
                            <div>
                                <label for="ano-veiculo" class="block text-xs font-semibold tracking-wide text-slate-400 mb-2 uppercase">Ano</label>
                                <input
                                    id="ano-veiculo"
                                    type="text"
                                    value="${ano}"
                                    readonly
                                    placeholder="—"
                                    class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-2.5 text-slate-300 text-sm cursor-not-allowed"
                                />
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold tracking-wide text-slate-300 mb-3 uppercase">2. Filtrar Peças por Montadora</label>
                        <div class="grid grid-cols-2 sm:grid-cols-5 gap-3">
                            ${montadoras.map(m => `
                                <button 
                                    onclick="alterarMontadora('${m}')"
                                    class="py-3 px-4 rounded-xl font-medium border text-sm transition-all text-center 
                                    ${montadora === m ? 'bg-accent border-accent text-slate-950 font-bold shadow-lg shadow-accent/20' : 'bg-slate-900 border-slate-700 text-slate-300 hover:border-slate-500'}">
                                    ${m}
                                </button>
                            `).join('')}
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold tracking-wide text-slate-300 mb-3 uppercase">3. Escolha o Componente</label>
                        <div class="space-y-3 max-h-72 overflow-y-auto pr-2 custom-scrollbar">
                            ${servicosPorMontadora[montadora]?.map(s => `
                                <div
