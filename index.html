<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Trends | O Panorama Atual</title>
    <style>
        /* ================= CSS ================= */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 4rem 2rem;
            background: linear-gradient(180deg, #020617 0%, var(--bg-color) 100%);
            border-bottom: 1px solid #334155;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent-glow);
            margin-bottom: 1rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        /* Grid de Cards */
        .tech-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .tech-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 2rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #334155;
            cursor: pointer;
        }

        .tech-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px var(--accent-glow);
            border-color: var(--accent);
        }

        .tech-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .tech-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #e2e8f0;
        }

        .tech-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        .tech-stats {
            background: #0f172a;
            padding: 1rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent);
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            border-top: 1px solid #334155;
            margin-top: 4rem;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>O Ecossistema Tecnológico Atual</h1>
        <p>Explore as tecnologias que estão moldando o presente e o futuro, e descubra o impacto global de cada uma delas com base em usuários e dispositivos conectados.</p>
    </header>

    <main class="container">
        <div class="tech-grid" id="grid-container">
            </div>
    </main>

    <footer>
        <p>Desenvolvido com HTML, CSS e JavaScript.</p>
    </footer>

    <script>
        /* ================= JAVASCRIPT ================= */
        
        // Base de dados das tecnologias
        const tecnologias = [
            {
                icon: "🤖",
                title: "Inteligência Artificial (LLMs)",
                desc: "Modelos de linguagem gigantes e agentes generativos (como ChatGPT, Gemini e Copilot) que estão revolucionando a automação, a criação de código e o suporte ao cliente.",
                statLabel: "Usuários Ativos",
                statValue: "300M+",
                targetNumber: 300
            },
            {
                icon: "☁️",
                title: "Cloud Computing",
                desc: "A espinha dorsal da internet moderna. Provedores como AWS, Azure e Google Cloud permitem que empresas escalem sistemas complexos sem hardware físico.",
                statLabel: "Empresas Clientes",
                statValue: "15M+",
                targetNumber: 15
            },
            {
                icon: "📱",
                title: "Sistemas Mobile (Android & iOS)",
                desc: "O principal ponto de acesso à internet mundial. O desenvolvimento mobile e as lojas de aplicativos representam a maior vitrine de software da atualidade.",
                statLabel: "Dispositivos Ativos",
                statValue: "7 Bilhões+",
                targetNumber: 7000
            },
            {
                icon: "🌐",
                title: "Web Stack (HTML/JS/CSS)",
                desc: "O tripé da web continua sendo a base de tudo. Com frameworks modernos como React, Vue e Angular, a web se tornou uma plataforma de aplicações ricas.",
                statLabel: "Desenvolvedores",
                statValue: "30M+",
                targetNumber: 30
            },
            {
                icon: "📡",
                title: "Internet das Coisas (IoT)",
                desc: "Dispositivos inteligentes conectados à rede. Desde lâmpadas e smartwatches até sensores industriais e veículos autônomos.",
                statLabel: "Dispositivos",
                statValue: "15 Bilhões+",
                targetNumber: 15000
            },
            {
                icon: "🔒",
                title: "Cibersegurança",
                desc: "Com o aumento da digitalização, a proteção de dados e infraestruturas tornou-se a prioridade número um para manter a integridade dos sistemas.",
                statLabel: "Investimento Global",
                statValue: "$200 Bi+",
                targetNumber: 200
            }
        ];

        // Função para renderizar os cards na tela
        function renderizarCards() {
            const container = document.getElementById('grid-container');
            
            tecnologias.forEach((tech) => {
                // Criando o elemento do card
                const card = document.createElement('div');
                card.className = 'tech-card';
                
                // Estrutura HTML do card
                card.innerHTML = `
                    <div class="tech-icon">${tech.icon}</div>
                    <h2 class="tech-title">${tech.title}</h2>
                    <p class="tech-desc">${tech.desc}</p>
                    <div class="tech-stats">
                        <span class="stat-label">${tech.statLabel}</span>
                        <span class="stat-value">${tech.statValue}</span>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        // Executar quando a página carregar
        document.addEventListener('DOMContentLoaded', () => {
            renderizarCards();
        });
    </script>
</body>
</html>
